name: llmci Evals

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check services/ shared/

  eval:
    if: github.event_name != 'pull_request' || github.head_ref != 'codex/focused-classifier-regression-demo'
    runs-on: ubuntu-latest
    needs: [lint]
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: ticket-classifier
            config: llmci.yaml
          - service: ticket-classifier
            config: llmci-prompt.yaml
          - service: ticket-classifier
            config: llmci-gate.yaml
          - service: rag-qa
            config: llmci.yaml
          - service: json-api
            config: llmci.yaml
          - service: support-agent
            config: llmci-single.yaml
          - service: support-agent
            config: llmci-multi.yaml
          - service: summarizer
            config: llmci-mock.yaml
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]" && pip install --upgrade llmci
      - name: Run eval
        working-directory: services/${{ matrix.service }}
        env:
          MOCK_LLM: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLMCI_REPORT_SLICE: ${{ matrix.service }}/${{ matrix.config }}
        run: |
          ARGS="--config ${{ matrix.config }}"
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ARGS="$ARGS --update-baseline"
          else
            ARGS="$ARGS --compare-to=origin/main"
          fi
          llmci run $ARGS

  blog-ticket-classifier-regression:
    if: github.event_name == 'pull_request' && github.head_ref == 'codex/focused-classifier-regression-demo'
    runs-on: ubuntu-latest
    needs: [lint]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]" && pip install --upgrade llmci
      - name: Run focused classifier prompt eval
        working-directory: services/ticket-classifier
        env:
          MOCK_LLM: "0"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLASSIFIER_MODEL: openai/gpt-4o-mini
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: llmci run --config llmci-prompt.yaml --compare-to=origin/main
