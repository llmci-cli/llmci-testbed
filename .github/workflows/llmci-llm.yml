name: llmci LLM Evals

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service directory name"
        required: true
        type: choice
        options:
          - summarizer
          - migration
          - migration-hard
          - support-agent
          - support-agent-multi
          - support-agent-history

jobs:
  eval:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]" && pip install --upgrade llmci
      - name: Run summarizer eval
        if: inputs.service == 'summarizer'
        working-directory: services/summarizer
        env:
          MOCK_LLM: "0"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: llmci run --config llmci.yaml
      - name: Run migration eval
        if: inputs.service == 'migration'
        working-directory: migration
        env:
          MOCK_LLM: "0"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: llmci run
      - name: Run hard migration smoke
        if: inputs.service == 'migration-hard'
        working-directory: migration-hard
        env:
          MOCK_LLM: "0"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          printf 'n\n' | llmci migrate \
            --from openai/gpt-4o \
            --to openai/gpt-4o-mini \
            --eval ticket-classification \
            --optimizer-model openai/gpt-4o-mini \
            --patience 3 \
            --max-iterations 3 | tee migration-hard.log
          grep -q "Iteration 1/" migration-hard.log
          grep -q "Final holdout on target model" migration-hard.log
      - name: Run support-agent full composite
        if: inputs.service == 'support-agent'
        working-directory: services/support-agent
        env:
          MOCK_LLM: "0"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: llmci run --config llmci-single-full.yaml
      - name: Run support-agent multi-turn composite
        if: inputs.service == 'support-agent-multi'
        working-directory: services/support-agent
        env:
          MOCK_LLM: "0"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: llmci run --config llmci-multi.yaml
      - name: Run support-agent history injection
        if: inputs.service == 'support-agent-history'
        working-directory: services/support-agent
        env:
          MOCK_LLM: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: llmci run --config llmci-history.yaml
